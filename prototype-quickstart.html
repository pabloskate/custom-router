<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quickstart – Prototype</title>
<style>
  /* ── Reset & dark theme ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page: #0c1117;
    --bg-card: #131a24;
    --bg-elevated: #19212e;
    --bg-input: #1c2535;
    --border: #253040;
    --border-subtle: #1e2a38;
    --accent: #67e8f9;
    --accent-dim: rgba(103, 232, 249, 0.08);
    --accent-glow: rgba(103, 232, 249, 0.12);
    --text-primary: #e8edf3;
    --text-secondary: #9aa8b8;
    --text-muted: #6b7a8d;
    --success: #34d399;
    --warning: #fbbf24;
    --radius: 10px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg-page);
    color: var(--text-primary);
    line-height: 1.55;
    padding: 2rem;
    max-width: 820px;
    margin: 0 auto;
  }

  /* ── Page header ────────────────────────────────────────────────── */
  .page-header {
    margin-bottom: 1.75rem;
  }
  .page-header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }
  .page-header p {
    font-size: 0.875rem;
    color: var(--text-muted);
  }

  /* ── Integration tabs ───────────────────────────────────────────── */
  .integration-tabs {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    font-family: var(--font-sans);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 150ms ease;
    white-space: nowrap;
  }
  .tab-btn:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
  }
  .tab-btn.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .tab-btn .tab-icon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    display: grid;
    place-items: center;
    font-size: 10px;
    font-weight: 700;
    font-family: var(--font-mono);
    flex-shrink: 0;
  }

  /* ── Code card ──────────────────────────────────────────────────── */
  .code-card {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-card);
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .code-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem 0.5rem 1rem;
    border-bottom: 1px solid var(--border-subtle);
    background: rgba(255,255,255,0.015);
  }
  .code-lang {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .code-card pre {
    margin: 0;
    padding: 1.25rem;
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    line-height: 1.7;
    color: var(--text-primary);
    tab-size: 2;
  }
  .code-card pre .cm { color: var(--text-muted); }
  .code-card pre .str { color: #a5d6ff; }
  .code-card pre .kw { color: #ff7b72; }
  .code-card pre .fn { color: #d2a8ff; }
  .code-card pre .prop { color: #79c0ff; }
  .code-card pre .var { color: #ffa657; }

  /* ── Inline connection bar ──────────────────────────────────────── */
  .conn-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    padding: 0.625rem 1rem;
    border-bottom: 1px solid var(--border-subtle);
    background: rgba(255,255,255,0.02);
    font-size: 0.8rem;
  }
  .conn-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .conn-label {
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }
  .conn-value {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-secondary);
  }
  .conn-sep {
    width: 1px;
    height: 16px;
    background: var(--border);
  }

  /* ── Buttons ────────────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.3rem 0.65rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-sans);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 120ms ease;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--text-muted); color: var(--text-primary); }
  .btn.copied { color: var(--success); border-color: rgba(52,211,153,0.3); }

  .btn-action {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 0.9rem;
    border-radius: 8px;
    border: 1.5px solid var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
    font-family: var(--font-sans);
    font-size: 0.8125rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 150ms ease;
  }
  .btn-action:hover { background: rgba(103,232,249,0.15); }

  .btn-link {
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--font-sans);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: rgba(103,232,249,0.3);
    text-underline-offset: 2px;
  }
  .btn-link:hover { text-decoration-color: var(--accent); }

  /* ── Key banner ─────────────────────────────────────────────────── */
  .key-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border-radius: var(--radius);
    background: rgba(251,191,36,0.06);
    border: 1px solid rgba(251,191,36,0.18);
    margin-bottom: 1rem;
    font-size: 0.8125rem;
    color: var(--text-secondary);
  }
  .key-banner .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--warning);
    flex-shrink: 0;
  }
  .key-banner.has-key {
    background: rgba(52,211,153,0.06);
    border-color: rgba(52,211,153,0.18);
  }
  .key-banner.has-key .dot { background: var(--success); }

  /* ── Next steps card ────────────────────────────────────────────── */
  .next-steps {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-card);
    padding: 1.25rem;
    margin-top: 0.5rem;
  }
  .next-steps h3 {
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
  }
  .step-row {
    display: flex;
    align-items: flex-start;
    gap: 0.875rem;
    padding: 0.625rem 0;
  }
  .step-row + .step-row {
    border-top: 1px solid var(--border-subtle);
  }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    display: grid;
    place-items: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-text {
    font-size: 0.8125rem;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  .step-text strong { color: var(--text-primary); font-weight: 600; }
  .step-text code {
    padding: 0.1rem 0.35rem;
    background: var(--bg-input);
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--accent);
  }

  /* ── Cursor guide ───────────────────────────────────────────────── */
  .cursor-guide {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .cursor-step {
    display: flex;
    gap: 1rem;
    padding-bottom: 1.5rem;
    position: relative;
  }
  .cursor-step:last-child { padding-bottom: 0; }
  .cursor-step:not(:last-child)::after {
    content: "";
    position: absolute;
    left: 15px;
    top: 32px;
    bottom: 0;
    width: 1px;
    background: var(--border);
  }
  .cursor-num {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-elevated);
    border: 1.5px solid var(--border);
    display: grid;
    place-items: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .cursor-body { flex: 1; padding-top: 0.35rem; }
  .cursor-body h4 {
    font-size: 0.875rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
    color: var(--text-primary);
  }
  .cursor-body p {
    font-size: 0.8125rem;
    color: var(--text-muted);
    line-height: 1.55;
  }
  .cursor-body .copy-row {
    margin-top: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.75rem;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-secondary);
  }
  .copy-row .flex { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .profile-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.625rem;
  }
  .profile-pill {
    display: inline-flex;
    align-items: center;
    padding: 0.2rem 0.65rem;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .profile-pill.primary {
    background: var(--accent-dim);
    border-color: rgba(103,232,249,0.3);
    color: var(--accent);
  }

  /* ── Toggle (has-key) ───────────────────────────────────────────── */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    padding: 0.5rem 0.75rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--text-muted);
    width: fit-content;
  }
  .toggle-row label { cursor: pointer; user-select: none; }
  .toggle-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }
</style>
</head>
<body>

<!-- Demo toggle -->
<div class="toggle-row">
  <input type="checkbox" id="toggleKey" />
  <label for="toggleKey">Simulate: user has an API key</label>
  &nbsp;&nbsp;
  <input type="checkbox" id="toggleProfiles" />
  <label for="toggleProfiles">Simulate: user has routing profiles</label>
</div>

<!-- ── Page header ─────────────────────────────────────────────────── -->
<div class="page-header">
  <h1>Quickstart</h1>
  <p>Copy a working example and make your first request in under a minute.</p>
</div>

<!-- ── Key banner (conditional) ────────────────────────────────────── -->
<div id="keyBanner"></div>

<!-- ── Integration tabs ────────────────────────────────────────────── -->
<div class="integration-tabs" id="tabs"></div>

<!-- ── Code area ───────────────────────────────────────────────────── -->
<div id="codeArea"></div>

<!-- ── Next steps ──────────────────────────────────────────────────── -->
<div id="nextSteps"></div>

<script>
// ─── State ──────────────────────────────────────────────────────────
const BASE_URL = "http://localhost:3010/api/v1";
const DEMO_KEY = "cr_live_a1b2c3...your-key";

let activeTab = "js";
let hasKey = false;
let hasProfiles = false;
const profileIds = ["fast-chat", "deep-research"];

const TABS = [
  { id: "js",     name: "OpenAI SDK",    tag: "Node / TS",    iconBg: "#f7df1e", iconColor: "#000", iconText: "JS" },
  { id: "python", name: "OpenAI SDK",    tag: "Python",       iconBg: "#3776ab", iconColor: "#fff", iconText: "Py" },
  { id: "curl",   name: "cURL",          tag: "HTTP / REST",  iconBg: "transparent", iconColor: "var(--text-muted)", iconText: ">" },
  { id: "cursor", name: "Cursor",        tag: "AI IDE",       iconBg: "#1a1a2e", iconColor: "#67e8f9", iconText: "cur" },
  { id: "vercel", name: "Vercel AI SDK", tag: "React / Next", iconBg: "#000",    iconColor: "#fff", iconText: "▲" },
];

// ─── Snippets ───────────────────────────────────────────────────────
function snippets() {
  const key = hasKey ? DEMO_KEY : "YOUR_API_KEY";
  const profileId = hasProfiles ? profileIds[0] : "openai/gpt-4o";
  const modelComment = hasProfiles
    ? `<span class="cm">// Uses your "${profileIds[0]}" routing profile</span>`
    : `<span class="cm">// Calls the model directly through your gateway</span>`;

  const profileHint = hasProfiles
    ? ""
    : `\n<span class="cm">// Want smart routing? Create a profile in the Routing tab,</span>\n<span class="cm">// then use its name as the model field.</span>`;

  return {
    js: {
      lang: "typescript",
      code: `<span class="kw">import</span> OpenAI <span class="kw">from</span> <span class="str">"openai"</span>;

<span class="kw">const</span> client = <span class="kw">new</span> <span class="fn">OpenAI</span>({
  <span class="prop">apiKey</span>: <span class="str">"${key}"</span>,
  <span class="prop">baseURL</span>: <span class="str">"${BASE_URL}"</span>,
});

${modelComment}
<span class="kw">const</span> res = <span class="kw">await</span> client.chat.completions.<span class="fn">create</span>({
  <span class="prop">model</span>: <span class="str">"${profileId}"</span>,
  <span class="prop">messages</span>: [{ <span class="prop">role</span>: <span class="str">"user"</span>, <span class="prop">content</span>: <span class="str">"Hello!"</span> }],
});${profileHint}`
    },
    python: {
      lang: "python",
      code: `<span class="kw">from</span> openai <span class="kw">import</span> OpenAI

client = <span class="fn">OpenAI</span>(
    <span class="prop">api_key</span>=<span class="str">"${key}"</span>,
    <span class="prop">base_url</span>=<span class="str">"${BASE_URL}"</span>,
)

${modelComment.replace("//", "#")}
response = client.chat.completions.<span class="fn">create</span>(
    <span class="prop">model</span>=<span class="str">"${profileId}"</span>,
    <span class="prop">messages</span>=[{<span class="str">"role"</span>: <span class="str">"user"</span>, <span class="str">"content"</span>: <span class="str">"Hello!"</span>}],
)${profileHint.replaceAll("//", "#")}`
    },
    curl: {
      lang: "bash",
      code: `${modelComment.replace("//", "#")}
<span class="fn">curl</span> ${BASE_URL}/chat/completions \\
  -H <span class="str">"Authorization: Bearer ${key}"</span> \\
  -H <span class="str">"Content-Type: application/json"</span> \\
  -d <span class="str">'{
    "model": "${profileId}",
    "messages": [{"role": "user", "content": "Hello!"}]
  }'</span>${profileHint.replaceAll("//", "#")}`
    },
    vercel: {
      lang: "typescript",
      code: `<span class="kw">import</span> { createOpenAI } <span class="kw">from</span> <span class="str">"@ai-sdk/openai"</span>;
<span class="kw">import</span> { streamText } <span class="kw">from</span> <span class="str">"ai"</span>;

<span class="kw">const</span> router = <span class="fn">createOpenAI</span>({
  <span class="prop">apiKey</span>: <span class="str">"${key}"</span>,
  <span class="prop">baseURL</span>: <span class="str">"${BASE_URL}"</span>,
});

<span class="kw">export async function</span> <span class="fn">POST</span>(req: Request) {
  <span class="kw">const</span> { messages } = <span class="kw">await</span> req.<span class="fn">json</span>();

  <span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">streamText</span>({
    <span class="prop">model</span>: router(<span class="str">"${profileId}"</span>),
    messages,
  });

  <span class="kw">return</span> result.<span class="fn">toDataStreamResponse</span>();
}${profileHint}`
    },
  };
}

// ─── Plain text for copy ────────────────────────────────────────────
function plainSnippets() {
  const key = hasKey ? DEMO_KEY : "YOUR_API_KEY";
  const profileId = hasProfiles ? profileIds[0] : "openai/gpt-4o";
  const comment = hasProfiles
    ? `// Uses your "${profileIds[0]}" routing profile`
    : `// Calls the model directly through your gateway`;
  const hint = hasProfiles
    ? ""
    : `\n// Want smart routing? Create a profile in the Routing tab,\n// then use its name as the model field.`;

  return {
    js: `import OpenAI from "openai";

const client = new OpenAI({
  apiKey: "${key}",
  baseURL: "${BASE_URL}",
});

${comment}
const res = await client.chat.completions.create({
  model: "${profileId}",
  messages: [{ role: "user", content: "Hello!" }],
});${hint}`,

    python: `from openai import OpenAI

client = OpenAI(
    api_key="${key}",
    base_url="${BASE_URL}",
)

${comment.replace("//", "#")}
response = client.chat.completions.create(
    model="${profileId}",
    messages=[{"role": "user", "content": "Hello!"}],
)${hint.replaceAll("//", "#")}`,

    curl: `${comment.replace("//", "#")}
curl ${BASE_URL}/chat/completions \\
  -H "Authorization: Bearer ${key}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "model": "${profileId}",
    "messages": [{"role": "user", "content": "Hello!"}]
  }'${hint.replaceAll("//", "#")}`,

    vercel: `import { createOpenAI } from "@ai-sdk/openai";
import { streamText } from "ai";

const router = createOpenAI({
  apiKey: "${key}",
  baseURL: "${BASE_URL}",
});

export async function POST(req: Request) {
  const { messages } = await req.json();

  const result = await streamText({
    model: router("${profileId}"),
    messages,
  });

  return result.toDataStreamResponse();
}${hint}`,
  };
}

// ─── Cursor guide ───────────────────────────────────────────────────
function renderCursorGuide() {
  const pills = hasProfiles
    ? profileIds.map((id, i) =>
        `<span class="profile-pill ${i === 0 ? 'primary' : ''}">${id}</span>`
      ).join("") + `<span class="profile-pill">openai/gpt-4o</span>`
    : `<span class="profile-pill primary">openai/gpt-4o</span><span class="profile-pill">anthropic/claude-3-5-sonnet</span>`;

  return `
    <div class="cursor-guide">
      <div class="cursor-step">
        <div class="cursor-num">1</div>
        <div class="cursor-body">
          <h4>Open Cursor settings</h4>
          <p><strong>Cursor → Settings → Models</strong> (or <code style="padding:0.05rem 0.35rem;background:var(--bg-input);border-radius:4px;font-size:0.8rem">⌘,</code> → search "models")</p>
        </div>
      </div>
      <div class="cursor-step">
        <div class="cursor-num">2</div>
        <div class="cursor-body">
          <h4>Set the OpenAI base URL</h4>
          <div class="copy-row">
            <span class="conn-label">base url</span>
            <span class="flex">${BASE_URL}</span>
            <button class="btn" onclick="copyText('${BASE_URL}', this)">Copy</button>
          </div>
        </div>
      </div>
      <div class="cursor-step">
        <div class="cursor-num">3</div>
        <div class="cursor-body">
          <h4>Paste your API key</h4>
          <p>Enter your CustomRouter key in the OpenAI API Key field.${!hasKey ? ' <button class="btn-link" onclick="alert(\'Navigate to API Keys tab\')">Generate one now →</button>' : ''}</p>
        </div>
      </div>
      <div class="cursor-step">
        <div class="cursor-num">4</div>
        <div class="cursor-body">
          <h4>Add model names</h4>
          <p>Under "Custom Models", add these — Cursor sends them to your router:</p>
          <div class="profile-pills">${pills}</div>
        </div>
      </div>
    </div>
  `;
}

// ─── Render ─────────────────────────────────────────────────────────
function render() {
  // Key banner
  const bannerEl = document.getElementById("keyBanner");
  if (!hasKey) {
    bannerEl.innerHTML = `
      <div class="key-banner">
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span class="dot"></span>
          <span>You need an API key to make requests.</span>
        </div>
        <button class="btn-action" onclick="alert('Navigate to API Keys tab')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 9.5l3 3L22 7l-3-3-3.5 3.5"/></svg>
          Generate API key
        </button>
      </div>`;
  } else {
    bannerEl.innerHTML = `
      <div class="key-banner has-key">
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span class="dot"></span>
          <span>API key active — you're ready to go.</span>
        </div>
      </div>`;
  }

  // Tabs
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = TABS.map(t => `
    <button class="tab-btn ${activeTab === t.id ? 'active' : ''}" data-tab="${t.id}">
      <span class="tab-icon" style="background:${t.iconBg};color:${t.iconColor};font-size:${t.iconText.length > 2 ? '8px' : '10px'}">${t.iconText}</span>
      ${t.name}
      <span style="font-size:0.6875rem;color:var(--text-muted);opacity:0.7">${t.tag}</span>
    </button>
  `).join("");

  tabsEl.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      render();
    });
  });

  // Code area
  const codeEl = document.getElementById("codeArea");

  if (activeTab === "cursor") {
    codeEl.innerHTML = `
      <div class="code-card">
        <div class="code-toolbar">
          <span class="code-lang">Cursor IDE setup</span>
        </div>
        <div style="padding:1.25rem">
          ${renderCursorGuide()}
        </div>
      </div>`;
  } else {
    const s = snippets()[activeTab];
    codeEl.innerHTML = `
      <div class="code-card">
        <div class="conn-bar">
          <div class="conn-item">
            <span class="conn-label">Base URL</span>
            <span class="conn-value">${BASE_URL}</span>
          </div>
          <div class="conn-sep"></div>
          <div class="conn-item">
            <span class="conn-label">Auth</span>
            <span class="conn-value">Bearer token</span>
          </div>
          <div class="conn-sep"></div>
          <div class="conn-item">
            <span class="conn-label">Compatible with</span>
            <span class="conn-value">OpenAI SDK</span>
          </div>
        </div>
        <div class="code-toolbar">
          <span class="code-lang">${s.lang}</span>
          <button class="btn" id="copyBtn" onclick="copySnippet(this)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
        <pre>${s.code}</pre>
      </div>`;
  }

  // Next steps
  const nextEl = document.getElementById("nextSteps");
  const steps = [];

  if (!hasProfiles) {
    steps.push(`<strong>Add smart routing</strong> — create a profile in the <strong>Routing</strong> tab, then use its name as the <code>model</code> field. The router picks the best model from your pool automatically.`);
  }
  steps.push(`<strong>Browse available models</strong> — check the <strong>Gateways</strong> tab to see what providers are configured, or call <code>GET /api/v1/models</code> for a live list.`);
  if (hasProfiles && !hasKey) {
    steps.push(`<strong>Generate an API key</strong> in the <strong>API Keys</strong> tab to authenticate your requests.`);
  }

  nextEl.innerHTML = `
    <div class="next-steps">
      <h3>Next steps</h3>
      ${steps.map((s, i) => `
        <div class="step-row">
          <div class="step-num">${i + 1}</div>
          <div class="step-text">${s}</div>
        </div>
      `).join("")}
    </div>`;
}

// ─── Copy helpers ───────────────────────────────────────────────────
function copySnippet(btn) {
  const plain = plainSnippets()[activeTab];
  navigator.clipboard.writeText(plain).then(() => {
    btn.classList.add("copied");
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
    }, 2000);
  });
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add("copied");
    btn.textContent = "Copied";
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.textContent = "Copy";
    }, 2000);
  });
}

// ─── Toggle wiring ──────────────────────────────────────────────────
document.getElementById("toggleKey").addEventListener("change", e => {
  hasKey = e.target.checked;
  render();
});
document.getElementById("toggleProfiles").addEventListener("change", e => {
  hasProfiles = e.target.checked;
  render();
});

// Initial render
render();
</script>
</body>
</html>
